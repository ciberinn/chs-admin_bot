<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ЧС Администрации</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 16px;
      color: #1e293b;
    }
    .container { max-width: 700px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
    }
    h1, h2 { margin: 0 0 16px 0; }
    label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.9rem; color: #64748b; }
    input, textarea, select, button {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      font-size: 16px;
      font-family: inherit;
      margin-bottom: 16px;
      background: #ffffff;
    }
    textarea { resize: vertical; min-height: 80px; }
    button {
      background: #1d4ed8;
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0;
    }
    button:active { background: #1e3a8a; }
    .error { color: #dc2626; font-size: 0.9rem; margin: -8px 0 12px 0; }
    .success { color: #16a34a; font-size: 0.9rem; margin: -8px 0 12px 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    th { background: #f8fafc; font-weight: 600; }
    .logout-btn { background: #64748b; }
    .flex-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tab-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      background: #e2e8f0;
      color: #1e293b;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      width: auto;
      flex: 1;
    }
    .tab.active {
      background: #1d4ed8;
      color: white;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .user-list-item {
      padding: 10px;
      border-bottom: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🛡️ ЧС Администрации</h1>

  <!-- Блок входа -->
  <div id="loginBlock" class="card">
    <h2>Вход</h2>
    <div id="loginError" class="error"></div>
    <label>Логин</label>
    <input type="text" id="loginUsername" placeholder="admin" value="">
    <label>Пароль</label>
    <input type="password" id="loginPassword" placeholder="••••••••" value="">
    <button id="loginBtn">Войти</button>
    <p style="font-size:0.9rem; margin-top:12px; color:#64748b;">Главный администратор: admin / admin123</p>
  </div>

  <!-- Блок приложения -->
  <div id="appBlock" style="display: none;">
    <div class="card">
      <div class="flex-row">
        <h2>👤 <span id="currentUserDisplay"></span> <span id="roleBadge" style="font-size:0.8rem; background:#e2e8f0; padding:4px 10px; border-radius:20px;"></span></h2>
        <button class="logout-btn" id="logoutBtn" style="width:auto; padding:10px 18px;">Выйти</button>
      </div>
    </div>

    <!-- Вкладки -->
    <div class="tab-bar">
      <button class="tab active" data-tab="blacklist">Чёрный список</button>
      <button class="tab" data-tab="users" id="usersTabBtn" style="display:none;">Пользователи</button>
    </div>

    <!-- Вкладка ЧС -->
    <div id="tab-blacklist" class="tab-content active">
      <div class="card">
        <h2>➕ Добавить в ЧС</h2>
        <div id="addMessage"></div>
        <label>ФИО *</label>
        <input type="text" id="fullName" placeholder="Иванов Иван Иванович">
        <label>ID аккаунта *</label>
        <input type="text" id="accountId" placeholder="Telegram ID / Discord ID">
        <label>Причина *</label>
        <textarea id="reason" placeholder="Мошенничество, спам..."></textarea>
        <label>Доп. информация</label>
        <input type="text" id="additionalInfo" placeholder="Любые приметы">
        <button id="addBtn">Добавить запись</button>
      </div>

      <div class="card">
        <h2>🔍 Поиск по базе</h2>
        <input type="text" id="searchQuery" placeholder="ФИО, ID, причина...">
        <button id="searchBtn">Искать</button>
        <div id="searchResults" style="margin-top:20px; overflow-x:auto;"></div>
      </div>
    </div>

    <!-- Вкладка Пользователи (только для админа) -->
    <div id="tab-users" class="tab-content">
      <div class="card">
        <h2>👥 Создать нового пользователя</h2>
        <div id="createUserMessage"></div>
        <label>Логин</label>
        <input type="text" id="newUsername" placeholder="user123">
        <label>Пароль</label>
        <input type="password" id="newPassword" placeholder="Не менее 4 символов">
        <label>Роль</label>
        <select id="newRole">
          <option value="user">Пользователь</option>
          <option value="admin">Администратор</option>
        </select>
        <button id="createUserBtn">Создать</button>
      </div>

      <div class="card">
        <h2>📋 Список пользователей</h2>
        <button id="refreshUsersBtn" style="margin-bottom:16px;">Обновить список</button>
        <div id="usersList"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzmJ5oZIpEAEotApnI30Kd2VB6kxXKk-ktMiXlfLSk-EpLupg47WkHWnrlPsN80qRmvcw/exec';
  let currentUser = null;

  async function callBackend(action, data) {
    try {
      const response = await fetch(BACKEND_URL + '?action=' + action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      return await response.json();
    } catch (error) {
      console.error('Ошибка:', error);
      return { success: false, message: 'Ошибка соединения' };
    }
  }

  // --- Вход ---
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errDiv = document.getElementById('loginError');

    if (!username || !password) {
      errDiv.textContent = 'Введите логин и пароль';
      return;
    }

    const res = await callBackend('login', { username, password });
    if (res.success) {
      currentUser = res.user;
      document.getElementById('loginBlock').style.display = 'none';
      document.getElementById('appBlock').style.display = 'block';
      document.getElementById('currentUserDisplay').textContent = currentUser.username;
      document.getElementById('roleBadge').textContent = currentUser.role === 'admin' ? 'Администратор' : 'Пользователь';
      
      if (currentUser.role === 'admin') {
        document.getElementById('usersTabBtn').style.display = 'block';
      }
      
      document.getElementById('loginPassword').value = '';
      errDiv.textContent = '';
    } else {
      errDiv.textContent = res.message || 'Ошибка входа';
    }
  });

  // --- Выход ---
  document.getElementById('logoutBtn').addEventListener('click', () => {
    currentUser = null;
    document.getElementById('loginBlock').style.display = 'block';
    document.getElementById('appBlock').style.display = 'none';
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('usersTabBtn').style.display = 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector('[data-tab="blacklist"]').classList.add('active');
    document.getElementById('tab-blacklist').classList.add('active');
  });

  // --- Переключение вкладок ---
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + target).classList.add('active');
      if (target === 'users' && currentUser.role === 'admin') {
        loadUsersList();
      }
    });
  });

  // --- Добавление в ЧС ---
  document.getElementById('addBtn').addEventListener('click', async () => {
    const fullName = document.getElementById('fullName').value.trim();
    const accountId = document.getElementById('accountId').value.trim();
    const reason = document.getElementById('reason').value.trim();
    const additionalInfo = document.getElementById('additionalInfo').value.trim();
    const msgDiv = document.getElementById('addMessage');

    if (!fullName || !accountId || !reason) {
      msgDiv.textContent = 'Заполните обязательные поля';
      msgDiv.className = 'error';
      return;
    }

    const res = await callBackend('add', {
      fullName, accountId, reason,
      addedBy: currentUser.id,
      additionalInfo
    });

    if (res.success) {
      msgDiv.textContent = `✅ Запись добавлена. ID: ${res.id}`;
      msgDiv.className = 'success';
      document.getElementById('fullName').value = '';
      document.getElementById('accountId').value = '';
      document.getElementById('reason').value = '';
      document.getElementById('additionalInfo').value = '';
    } else {
      msgDiv.textContent = `❌ ${res.message}`;
      msgDiv.className = 'error';
    }
  });

  // --- Поиск ---
  document.getElementById('searchBtn').addEventListener('click', async () => {
    const query = document.getElementById('searchQuery').value.trim();
    const resultsDiv = document.getElementById('searchResults');
    if (!query) { resultsDiv.innerHTML = '<p>Введите запрос</p>'; return; }
    resultsDiv.innerHTML = '<p>Поиск...</p>';
    const results = await callBackend('search', { query });
    if (Array.isArray(results) && results.length) {
      let html = '<table><tr><th>ФИО</th><th>ID</th><th>Причина</th><th>Дата</th></tr>';
      results.forEach(item => {
        html += `<tr><td>${item.FullName||''}</td><td>${item.AccountID||''}</td><td>${item.Reason||''}</td><td>${item.DateAdded||''}</td></tr>`;
      });
      html += '</table>';
      resultsDiv.innerHTML = html;
    } else {
      resultsDiv.innerHTML = '<p>🔎 Ничего не найдено</p>';
    }
  });

  // --- Создание пользователя (админ) ---
  document.getElementById('createUserBtn').addEventListener('click', async () => {
    const newUsername = document.getElementById('newUsername').value.trim();
    const newPassword = document.getElementById('newPassword').value;
    const role = document.getElementById('newRole').value;
    const msgDiv = document.getElementById('createUserMessage');

    if (!newUsername || !newPassword) {
      msgDiv.textContent = 'Заполните логин и пароль';
      msgDiv.className = 'error';
      return;
    }
    if (newPassword.length < 4) {
      msgDiv.textContent = 'Пароль должен быть не менее 4 символов';
      msgDiv.className = 'error';
      return;
    }

    const res = await callBackend('createUser', {
      adminId: currentUser.id,
      newUsername,
      newPassword,
      role
    });

    if (res.success) {
      msgDiv.textContent = `✅ ${res.message}`;
      msgDiv.className = 'success';
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
      loadUsersList();
    } else {
      msgDiv.textContent = `❌ ${res.message}`;
      msgDiv.className = 'error';
    }
  });

  // --- Загрузка списка пользователей ---
  async function loadUsersList() {
    const div = document.getElementById('usersList');
    div.innerHTML = '<p>Загрузка...</p>';
    const res = await callBackend('getUsers', { adminId: currentUser.id });
    if (!Array.isArray(res)) {
      div.innerHTML = '<p>Ошибка загрузки</p>';
      return;
    }
    let html = '';
    res.forEach(u => {
      html += `<div class="user-list-item"><strong>${u.username}</strong> (${u.role}) ID: ${u.id}</div>`;
    });
    div.innerHTML = html || '<p>Нет пользователей</p>';
  }

  document.getElementById('refreshUsersBtn').addEventListener('click', loadUsersList);

  // Enter в поле пароля
  document.getElementById('loginPassword').addEventListener('keypress', (e) => { if(e.key==='Enter') document.getElementById('loginBtn').click(); });
  document.getElementById('searchQuery').addEventListener('keypress', (e) => { if(e.key==='Enter') document.getElementById('searchBtn').click(); });
</script>
</body>
</html>
